services:
  db:
    image: postgres:16
    container_name: myreadei_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: MyReaDei
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - myreadei_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: myreadei_redis
    ports:
      - "6379:6379"
    networks:
      - myreadei_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: myreadei_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_DOMAIN: localhost
      MINIO_SERVER_URL: http://localhost:9000
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - myreadei_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: myreadei_backend
    environment:
      DATABASE_URL: postgresql://postgres:root@db:5432/MyReaDei
      
      SECRET_KEY: your-secret-key-here-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      
      REDIS_URL: redis://redis:6379/0
      
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: lax
      REFRESH_COOKIE_NAME: refresh_token
      
      STORAGE_TYPE: minio
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: book-covers
      MINIO_SECURE: "false"
      MINIO_PUBLIC_URL: http://localhost:9000
      
      MAX_FILE_SIZE: 10485760  
      ALLOWED_EXTENSIONS: jpg,jpeg,png,gif,webp
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app  
      - backend_static:/app/static
    networks:
      - myreadei_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend/my-react-app
      dockerfile: Dockerfile
    container_name: myreadei_frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - myreadei_network
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_MINIO_URL: http://localhost:9000

volumes:
  pgdata:
  minio_data:
  backend_static:

networks:
  myreadei_network:
    driver: bridge