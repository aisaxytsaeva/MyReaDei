name: CI - Continuous Integration

on:
  push:
    branches: [develop, main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [develop, main]

env:
  PYTHON_VERSION: '3.13'
  NODE_VERSION: '20'

jobs:
  lint-backend:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install flake8 black mypy

      - name: Run Flake8
        run: |
          cd backend
          flake8 app/ --max-line-length=120 --exclude=migrations

      - name: Run Black
        run: |
          cd backend
          black --check app/

      - name: Run mypy
        run: |
          cd backend
          mypy app/ --ignore-missing-imports

  lint-frontend:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/my-react-app/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend/my-react-app
          npm ci

      - name: Run ESLint
        run: |
          cd frontend/my-react-app
          npm run lint --if-present

      - name: Run TypeScript check
        run: |
          cd frontend/my-react-app
          npx tsc --noEmit

  test-backend:
    runs-on: ubuntu-22.04
    needs: lint-backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
          POSTGRES_DB: MyReaDei_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://postgres:root@localhost:5432/MyReaDei_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test_secret_key
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
          STORAGE_TYPE: local
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=html

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.xml
          flags: backend

  test-frontend:
    runs-on: ubuntu-22.04
    needs: lint-frontend
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/my-react-app/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend/my-react-app
          npm ci

      - name: Run unit tests
        run: |
          cd frontend/my-react-app
          npm test -- --watchAll=false --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          directory: ./frontend/my-react-app/coverage
          flags: frontend

  test-e2e:
    runs-on: ubuntu-22.04
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Playwright
        run: |
          cd frontend/my-react-app
          npm ci
          npx playwright install --with-deps firefox

      - name: Start Docker Compose
        run: |
          cp .env.example .env
          docker-compose -f docker-compose.test.yml up -d --build
          sleep 30

      - name: Run E2E tests
        run: |
          cd frontend/my-react-app
          npx playwright test e2e/specs/ --project=firefox

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: frontend/my-react-app/playwright-report/

      - name: Stop Docker Compose
        if: always()
        run: docker-compose -f docker-compose.test.yml down

  security-scan:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.12.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Dependency check
        run: |
          cd backend
          pip install safety
          safety check -r requirements.txt

  build-images:
    runs-on: ubuntu-22.04
    needs: [test-e2e, security-scan]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Backend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: myreadei-backend:ci-${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new

      - name: Build Frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend/my-react-app
          file: ./frontend/my-react-app/Dockerfile
          push: false
          tags: myreadei-frontend:ci-${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache